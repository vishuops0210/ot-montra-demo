apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: java-app
          - app: java2-app
          # 👆 add a new line here for every new app, nothing else to touch
  template:
    metadata:
      name: '{{app}}-dev'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        environment: dev
        app: '{{app}}-dev'
    spec:
      project: dev
      source:
        repoURL: 'https://github.com/vishutyagi0210/demo-argocd.git'
        targetRevision: HEAD
        path: gitops-repo/helm
        helm:
          valueFiles:
            - values.yaml
            - ../applications/dev/{{app}}-dev-values.yaml
      destination:
        # In-cluster mode — both ArgoCD and the workloads live on the same cluster
        server: https://kubernetes.default.svc
        namespace: '{{app}}-dev'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m